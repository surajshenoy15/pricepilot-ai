# =========================================================
# SERVER
# =========================================================

server.port=${PORT:9090}
server.address=0.0.0.0


# =========================================================
# MULTIPART
# =========================================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# =========================================================
# POSTGRESQL
# =========================================================

# Render uses DATABASE_URL.
# The fallback allows local PostgreSQL development.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pricepilot}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver


# =========================================================
# JPA / HIBERNATE
# =========================================================

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true


# =========================================================
# JWT
# =========================================================

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000


# =========================================================
# GEMINI
# =========================================================

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent


# =========================================================
# SCRAPER
# =========================================================

scraper.timeout-ms=10000
scraperapi.api.key=${SCRAPERAPI_KEY:}
scraperapi.api.url=https://api.scraperapi.com


# =========================================================
# SWAGGER
# =========================================================

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# =========================================================
# JACKSON
# =========================================================

spring.jackson.serialization.fail-on-empty-beans=false


# =========================================================
# SPRING
# =========================================================

spring.main.allow-bean-definition-overriding=true


# =========================================================
# LOGGING
# =========================================================

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO