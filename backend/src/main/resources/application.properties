# Server
server.port=8080

# H2 In-Memory Database (no PostgreSQL needed)
spring.datasource.url=jdbc:h2:mem:pricepilotdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (optional, view DB in browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT (ask Student A for the real secret, use this for testing)
jwt.secret=pricepilot-secret-key-for-testing-only-make-it-long-enough
jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html