spring:
  application:
    name: pricepilot-ai

  # Use H2 for quick start (switch to PostgreSQL for production)
  datasource:
    url: jdbc:h2:file:./data/pricepilot;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
app:
  jwt:
    secret: PricePilotAI2024SecretKeyForJWTTokenGenerationMustBeLongEnough256Bits!!
    expiration-ms: 86400000  # 24 hours

# Google Gemini AI Configuration
gemini:
  api-key: ${GEMINI_API_KEY:your-api-key-here}
  model: gemini-2.0-flash
  base-url: https://generativelanguage.googleapis.com/v1beta/models

# Server
server:
  port: 9090

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# PostgreSQL Profile (for production)
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://localhost:5432/pricepilot
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
