# Server
server.port=${PORT:9090}

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pricepilot}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:pricepilot-secret-key-for-testing-only-make-it-long-enough}
app.jwt.expiration-ms=86400000

# Gemini
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Scraper
scraper.timeout-ms=10000
scraperapi.api.key=${SCRAPERAPI_KEY:}
scraperapi.api.url=http://api.scraperapi.com

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG